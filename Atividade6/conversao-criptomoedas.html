<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consulta de Preço - Binance</title>
  <link rel="stylesheet" href="conversao-criptomoedas.css">
  <script defer src = "conversao-criptomoedas.js"></script>
</head>
<body>
  <div class="container">
    <h1>Consultar Preço de Moedas</h1>
    <label for="moedaBase">Moeda Base (Ex.: BTC):</label>
    <input list="moedasBases" type="text" id="moedaBase" placeholder="Digite a moeda base">
    
    <datalist id="moedasBases">
      <option value="BTC">
      <option value="ETH">
      <option value="SOL">
      <option value="XRP">
      <option value="DOGE">
      <option value="BRL">
    </datalist> 
    
    <label for="moedaConversao">Moeda Conversão (Ex.: USDT):</label>
    <input list="moedasConversao" type="text" id="moedaConversao" placeholder="Digite a moeda de conversão">
    
    <datalist id="moedasConversao">
      <option value="USDT">
      <option value="BRL">
    </datalist>

    <div class = "botoes">
      <div class="botoesModif">
        <button id="botaoLimparCampos">Limpar Campos</button>
        <button id="botaoInverterMoedas">Inverter Moedas</button>
        </div>
      
      <button id="botaoConsultar">Consultar</button>
    </div>

    
    <div id="resultado"></div>
  </div>

</body>
</html>
