<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script defer src="cats-things.js"></script>
    <link rel="stylesheet" href="cats-things.css">
    <title>Coisas sobre gatos</title>
    <link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
    <div class="container">
        <h1><i class="fa-solid fa-paw fa-bounce fa-2xs" style="color: rgb(255, 192, 203);"></i> Cat Things <i class="fa-solid fa-paw fa-bounce fa-2xs" style="color: rgb(255, 192, 203);"></i></h1>
        
        <div class="caixaImg">
            <img id="randomImg">
        </div>
        <h3 class="comando">
            Utilize os botões abaixo para descobrir fatos sobre gatos e também aproveitar
            fotinhas hiperfofas
            <br>
            <span>♡</span>
        </h3>
        <div class="botoes">
            <button class="botao" id="botaoImgRandom">Substituir Imagem</button>
            <button class="botao" id="botaoBuscarFato">Buscar fato</button>
        </div>
        <div id="resultado">
            <p>Clique em "Buscar fato"</p>
        </div>
    </div>
</body>
</html>
